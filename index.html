<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>bats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #img-bg, #video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    #yt-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 177.78vh; /* 16/9 * 100vh */
      height: 100vh;
      min-width: 100vw;
      min-height: 56.25vw; /* 9/16 * 100vw */
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }

    canvas#bg {
      display: none;
    }

    .center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .clock {
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.75);
      font-weight: 300;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      line-height: 1;
    }

    .icons {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.28);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    #page-intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 1;
      transition: opacity 1.2s ease, backdrop-filter 1.2s ease, -webkit-backdrop-filter 1.2s ease;
      pointer-events: none;
    }

    #page-intro.fade-out {
      opacity: 0;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
    }

    .footer {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.04em;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .corner-icon {
      position: fixed;
      bottom: 14px;
      right: 16px;
      z-index: 10;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
    }

    .corner-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .music-btn {
      position: fixed;
      bottom: 14px;
      left: 16px;
      z-index: 10;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none;
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s, color 0.2s;
    }

    .music-btn:hover {
      background: rgba(255,255,255,0.22);
      color: #fff;
    }

    .music-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
  </style>
</head>
<body>

</div>

<script>
  // ── Live Clock ──────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${m}:${s} ${ampm}`;
  }
  setInterval(updateClock, 1000);
  updateClock();


  // ── Music toggle (YouTube IFrame API) ───────────────────────────────────────
  const musicBtn = document.getElementById('music-btn');
  const iconPlay = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');
  let ytPlayer = null;
  let muted = true;

  function setPlayingUI(playing) {
    iconPlay.style.display = playing ? 'none' : '';
    iconPause.style.display = playing ? '' : 'none';
  }

  window.onYouTubeIframeAPIReady = function () {
    ytPlayer = new YT.Player('yt-bg', {
      events: {
        onReady: (e) => {
          e.target.setVolume(10);
          setPlayingUI(false); // starts muted, show play icon
        }
      }
    });
  };

  // Load YouTube IFrame API
  const ytScript = document.createElement('script');
  ytScript.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(ytScript);

  musicBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!ytPlayer) return;
    if (muted) {
      ytPlayer.unMute();
      muted = false;
      setPlayingUI(true);
    } else {
      ytPlayer.mute();
      muted = true;
      setPlayingUI(false);
    }
  });

  // ── Intro fade-in ───────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('page-intro').classList.add('fade-out');
    }, 300);
  });

  // ── Fullscreen toggle ───────────────────────────────────────────────────────
  document.querySelector('.corner-icon').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });
</script>
